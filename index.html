<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>វិញ្ញាសាប្រឡងតេស្តសមត្ថភាព៖ ធរណីមាត្រក្នុងលំហ (វគ្គ៤)</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    
    <style>
        :root { --primary: #273746; --accent: #e67e22; --success: #27ae60; }
        body { font-family: 'Khmer OS Battambang', sans-serif; background: #f4f7f6; padding: 20px; color: #333; line-height: 1.7; }
        .quiz-container { max-width: 850px; margin: auto; background: #fff; padding: 35px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; border-bottom: 3px solid var(--accent); padding-bottom: 15px; }
        .student-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #fdf2e9; padding: 20px; border-radius: 8px; border-left: 5px solid var(--accent); }
        .student-info div { display: flex; flex-direction: column; }
        .student-info label { font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; }
        .question-box { margin-bottom: 30px; padding: 20px; border: 1px solid #e1e8ed; background: #fff; border-radius: 8px; }
        .question-title { font-weight: bold; color: var(--primary); margin-bottom: 15px; font-size: 1.05em; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-left: 10px; }
        .options label { cursor: pointer; display: flex; align-items: center; gap: 10px; padding: 5px; border-radius: 4px; }
        .options label:hover { background: #fdf2e9; }
        .btn-submit { width: 100%; padding: 15px; background: var(--success); color: white; border: none; font-size: 1.2em; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-submit:hover { background: #219150; }
        .feedback { margin-top: 15px; padding: 15px; display: none; border-radius: 6px; font-size: 0.95em; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #summary { text-align: center; margin-top: 30px; font-weight: bold; font-size: 1.4em; color: var(--primary); padding: 20px; background: #e8f8f5; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>📝 វិញ្ញាសាតេស្ត៖ ធរណីមាត្រក្នុងលំហ (ទី៦) <br>រៀបរៀងដោយលោកគ្រូ រស់ មករា</h1>
    
    <div class="student-info">
        <div>
            <label for="sName">ឈ្មោះសិស្ស៖</label>
            <input type="text" id="sName" placeholder="វាយបញ្ចូលឈ្មោះនៅទីនេះ...">
        </div>
        <div>
            <label for="sClass">ថ្នាក់រៀន៖</label>
            <input type="text" id="sClass" placeholder="ឧទាហរណ៍៖ ១២អា">
        </div>
    </div>

    <form id="quizForm"></form>
    
    <button type="button" class="btn-submit" onclick="evaluateQuiz()">បញ្ជូនវិញ្ញាសា និងពិនិត្យលទ្ធផល</button>
    <div id="summary"></div>
</div>

<script>
    // សំណួរថ្មីទាំង ២៥ អំពីធរណីមាត្រក្នុងលំហ (វគ្គ៤)
    const questions = [
        { q: "រកកូអរដោនេនៃវ៉ិចទ័រ $\\vec{u} = \\vec{i} + 3\\vec{k}$ ក្នុងលំហ?", opt: ["$(1, 0, 3)$", "$(1, 3, 0)$", "$(0, 1, 3)$", "$(1, 3, 3)$"], ans: "$(1, 0, 3)$", exp: "ដោយសារគ្មានសមាសភាគតាមអ័ក្ស $Oy$ នាំឱ្យមេគុណ $j$ ស្មើ $0$ ដូចនេះ $\\vec{u} = (1, 0, 3)$។" },
        { q: "គណនាមុំរវាងវ៉ិចទ័រ $\\vec{u}=(1, 1, 0)$ និង $\\vec{v}=(0, 1, 1)$?", opt: ["$60^\\circ$", "$30^\\circ$", "$45^\\circ$", "$90^\\circ$"], ans: "$60^\\circ$", exp: "$\\cos\\theta = \\frac{\\vec{u}\\cdot\\vec{v}}{||\\vec{u}||\\cdot||\\vec{v}||} = \\frac{1}{\\sqrt{2}\\cdot\\sqrt{2}} = \\frac{1}{2} \\Rightarrow \\theta = 60^\\circ$។" },
        { q: "រកសមីការប្លង់មេដ្យាទ័រនៃអង្កត់ $AB$ បើ $A(1, 2, 3)$ និង $B(1, 2, 5)$?", opt: ["$z = 4$", "$z = 1$", "$x + y = 3$", "$z = 8$"], ans: "$z = 4$", exp: "ចំណុចកណ្តាល $I(1, 2, 4)$ និងវ៉ិចទ័រណរម៉ាល់ $\\vec{AB}=(0, 0, 2)$។ សមីការប្លង់៖ $2(z-4)=0 \\Rightarrow z=4$។" },
        { q: "រកមាឌរបស់តេត្រាអែត $OABC$ បើ $A(1,0,0), B(0,1,0), C(0,0,1)$ និង $O(0,0,0)$?", opt: ["$\\frac{1}{6}$", "$\\frac{1}{3}$", "$1$", "$\\frac{1}{2}$"], ans: "$\\frac{1}{6}$", exp: "មាឌតេត្រាអែត $V = \\frac{1}{6}|(\\vec{OA}\\times\\vec{OB})\\cdot\\vec{OC}| = \\frac{1}{6}|(0,0,1)\\cdot(0,0,1)| = \\frac{1}{6}$។" },
        { q: "តើចំណុច $P(2, -3, 4)$ ស្ថិតនៅក្នុងកាដ្រង់ទីប៉ុន្មាន បើគិតតាមសញ្ញានៃអ័ក្ស $Ox$ និង $Oy$ ក្នុងប្លង់កូអរដោនេ?", opt: ["កាដ្រង់ទី៤", "កាដ្រង់ទី១", "កាដ្រង់ទី២", "កាដ្រង់ទី៣"], ans: "កាដ្រង់ទី៤", exp: "ដោយសារ $x > 0$ និង $y < 0$ នោះបើឆ្លុះទៅលើប្លង់ $(Oxy)$ វាស្ថិតក្នុងកាដ្រង់ទី៤។" },
        { q: "រកសមីការប្លង់ដែលកាត់តាមចំណុច $A(1, 1, 1)$ ហើយស្របនឹងប្លង់ $x + y + z - 5 = 0$?", opt: ["$x + y + z - 3 = 0$", "$x + y + z = 0$", "$x + y + z + 3 = 0$", "$x + y + z - 5 = 0$"], ans: "$x + y + z - 3 = 0$", exp: "ប្លង់ស្របគ្នាមានវ៉ិចទ័រណរម៉ាល់ដូចគ្នា $\\vec{n}=(1,1,1)$ នាំឱ្យបាន $1(x-1)+1(y-1)+1(z-1)=0 \\Rightarrow x+y+z-3=0$។" },
        { q: "រកកូអរដោនេវ៉ិចទ័រប្រាប់ទិសនៃបន្ទាត់ដែលជាអ័ក្ស $Oy$?", opt: ["$(0, 1, 0)$", "$(1, 0, 0)$", "$(0, 0, 1)$", "$(1, 1, 0)$"], ans: "$(0, 1, 0)$", exp: "អ័ក្ស $Oy$ មានវ៉ិចទ័រឯកតាគោលគឺ $\\vec{j} = (0, 1, 0)$។" },
        { q: "គណនាចម្ងាយរវាងប្លង់ស្របគ្នាពីរ $(P): x + 2y - 2z + 1 = 0$ និង $(Q): x + 2y - 2z - 5 = 0$?", opt: ["$2$", "$6$", "$3$", "$4$"], ans: "$2$", exp: "$d = \\frac{|d_1 - d_2|}{\\sqrt{a^2+b^2+c^2}} = \\frac{|1 - (-5)|}{\\sqrt{1^2+2^2+(-2)^2}} = \\frac{6}{3} = 2$។" },
        { q: "តើបន្ទាត់ $(L): \\begin{cases} x = 1 \\\\ y = 2 \\\\ z = t \\end{cases}$ មានទំនាក់ទំនងគ្នាយ៉ាងណាជាមួយអ័ក្ស $Oz$?", opt: ["ស្របគ្នា", "កែងគ្នា", "កាត់គ្នា", "ជាន់គ្នា"], ans: "ស្របគ្នា", exp: "បន្ទាត់មានវ៉ិចទ័រប្រាប់ទិស $\\vec{u}=(0,0,1)$ ដូចនឹងអ័ក្ស $Oz$ ដែរ ប៉ុន្តែមិនកាត់គល់ $O$ ទេ ដូចនេះវាស្របគ្នា។" },
        { q: "រកសមីការដែនស៊្វែរដែលមានផ្ចិត $I(0, 3, 0)$ ហើយប៉ះនឹងប្លង់ $(Oxz)$?", opt: ["$x^2 + (y-3)^2 + z^2 = 9$", "$x^2 + y^2 + z^2 = 9$", "$x^2 + (y-3)^2 + z^2 = 3$", "$(x-3)^2 + y^2 + z^2 = 9$"], ans: "$x^2 + (y-3)^2 + z^2 = 9$", exp: "ចម្ងាយពីផ្ចិតទៅប្លង់ $(Oxz)$ គឺស្មើ $|y_0| = |3| = 3$ ដែលជាកាំ $R$។ ដូចនេះសមីការគឺ $x^2 + (y-3)^2 + z^2 = 9$។" },
        { q: "គណនាផលគុណស្កាលែ $\\vec{u} \\cdot (\\vec{u} \\times \\vec{v})$ ជានិច្ចកាលស្មើនឹងអ្វី?", opt: ["$0$", "$1$", "$||\\vec{u}||^2$", "$\\vec{0}$"], ans: "$0$", exp: "ដោយសារ $\\vec{u} \\times \\vec{v}$ កែងនឹង $\\vec{u}$ ជានិច្ច នាំឱ្យផលគុណស្កាលែរបស់វ៉ិចទ័រកែងគ្នាស្មើ $0$។" },
        { q: "រកកូអរដោនេចំណុចប្រសព្វរវាងបន្ទាត់ $(L): \\frac{x}{1} = \\frac{y-1}{2} = \\frac{z}{3}$ ជាមួយប្លង់ $(Oxy)$?", opt: ["$(0, 1, 0)$", "$(0, 0, 0)$", "$(1, 2, 3)$", "$(0, -1, 0)$"], ans: "$(0, 1, 0)$", exp: "ប្លង់ $(Oxy)$ មាន $z = 0 \\Rightarrow \\frac{z}{3} = 0 \\Rightarrow x = 0$ និង $\\frac{y-1}{2} = 0 \\Rightarrow y = 1$។ ចំណុចនោះគឺ $(0, 1, 0)$។" },
        { q: "រកតម្លៃ $k$ ដើម្បីឱ្យវ៉ិចទ័រ $\\vec{u}=(k, 1, 2)$ និង $\\vec{v}=(1, k, 3)$ មានផលគុណស្កាលែស្មើ $8$?", opt: ["$1$", "$2$", "$0$", "$-1$"], ans: "$1$", exp: "$\\vec{u}\\cdot\\vec{v} = k(1) + 1(k) + 2(3) = 2k + 6 = 8 \\Rightarrow 2k = 2 \\Rightarrow k = 1$។" },
        { q: "តើដែនស៊្វែរ $x^2 + y^2 + z^2 = 4$ និងប្លង់ $z = 3$ មានចំណុចប្រព្វគ្នាប៉ុន្មាន?", opt: ["គ្មានចំណុចប្រសព្វទេ", "មានមួយចំណុច (ប៉ះគ្នា)", "ប្រសព្វគ្នាបង្កើតបានជារង្វង់", "មានពីរចំណុច"], ans: "គ្មានចំណុចប្រសព្វទេ", exp: "ចម្ងាយពីផ្ចិត $(0,0,0)$ ទៅប្លង់គឺ $d = 3$ ដែលធំជាងកាំ $R = 2$ នាំឱ្យវាគ្មានចំណុចប្រសព្វឡើយ។" },
        { q: "រកសមីការប្លង់កាត់តាមចំណុច $A(2, 0, 0), B(0, 3, 0), C(0, 0, 4)$?", opt: ["$\\frac{x}{2} + \\frac{y}{3} + \\frac{z}{4} = 1$", "$\\frac{x}{2} + \\frac{y}{3} + \\frac{z}{4} = 0$", "$2x + 3y + 4z = 1$", "$6x + 4y + 3z = 1$"], ans: "$\\frac{x}{2} + \\frac{y}{3} + \\frac{z}{4} = 1$", exp: "នេះជាសមីការប្លង់តាមចំណែកកាត់លើអ័ក្ស (Intercept form)៖ $\\frac{x}{a} + \\frac{y}{b} + \\frac{z}{c} = 1$។" },
        { q: "គណនាផ្ទៃក្រឡាត្រីកោណសម័ង្សដែលមានជ្រុងបង្កើតដោយវ៉ិចទ័រ $\\vec{u}$ និង $\\vec{v}$ បើ $||\\vec{u}||=2, ||\\vec{v}||=2$ និងមុំរវាងវាស្មើ $60^\\circ$?", opt: ["$\\sqrt{3}$", "$2\\sqrt{3}$", "$1$", "$\\frac{\\sqrt{3}}{2}$"], ans: "$\\sqrt{3}$", exp: "$S = \\frac{1}{2}||\\vec{u}\\times\\vec{v}|| = \\frac{1}{2}||\\vec{u}||\\cdot||\\vec{v}||\\sin 60^\\circ = \\frac{1}{2}(2)(2)\\frac{\\sqrt{3}}{2} = \\sqrt{3}$។" },
        { q: "តើបន្ទាត់ពីរដែលមានវ៉ិចទ័រប្រាប់ទិស $\\vec{u}_1=(1, 0, 0)$ និង $\\vec{u}_2=(0, 1, 0)$ អាចស្របគ្នាបានទេ?", opt: ["មិនអាចទេ ព្រោះវ៉ិចទ័រប្រាប់ទិសរបស់វាកែងគ្នា", "អាច បើវាស្ថិតក្នុងប្លង់តែមួយ", "អាច គ្រប់ករណី", "មិនអាចទេ ព្រោះវាជាន់គ្នា"], ans: "មិនអាចទេ ព្រោះវ៉ិចទ័រប្រាប់ទិសរបស់វាកែងគ្នា", exp: "$\\vec{u}_1\\cdot\\vec{u}_2 = 1(0)+0(1)+0(0)=0$ វ៉ិចទ័រកែងគ្នាមិនអាចស្របគ្នាបានឡើយ។" },
        { q: "រកកូអរដោនេទីប្រជុំទម្ងន់នៃតេត្រាអែត $ABCD$ បើ $A(4,0,0), B(0,4,0), C(0,0,4), D(0,0,0)$?", opt: ["$(1, 1, 1)$", "$(2, 2, 2)$", "$\\left(\\frac{4}{3}, \\frac{4}{3}, \\frac{4}{3}\\right)$", "$(0, 0, 0)$"], ans: "$(1, 1, 1)$", exp: "$G = \\left(\\frac{4+0+0+0}{4}, \\frac{0+4+0+0}{4}, \\frac{0+0+4+0}{4}\\right) = (1, 1, 1)$។" },
        { q: "បើប្លង់ $(P): x + y + z - 1 = 0$ កាត់អ័ក្ស $Oz$ ត្រង់ចំណុច $M$ តើ $M$ មានកូអរដោនេដូចម្តេច?", opt: ["$(0, 0, 1)$", "$(1, 0, 0)$", "$(0, 1, 0)$", "$(0, 0, -1)$"], ans: "$(0, 0, 1)$", exp: "កាត់អ័ក្ស $Oz \\Rightarrow x=0, y=0 \\Rightarrow 0+0+z-1=0 \\Rightarrow z=1$ នាំឱ្យបាន $(0,0,1)$។" },
        { q: "គណនាផលគុណខ្វែង $(\\vec{i} + \\vec{j}) \\times \\vec{i}$?", opt: ["$-\\vec{k}$", "$\\vec{k}$", "$\\vec{0}$", "$\\vec{j}$"], ans: "$-\\vec{k}$", exp: " $(\\vec{i}\\times\\vec{i}) + (\\vec{j}\\times\\vec{i}) = \\vec{0} - \\vec{k} = -\\vec{k}$។" },
        { q: "រកសមីការប៉ារ៉ាម៉ែត្រនៃបន្ទាត់ដែលជាអ័ក្ស $Oz$?", opt: ["$\\begin{cases} x = 0 \\\\ y = 0 \\\\ z = t \\end{cases}$", "$\\begin{cases} x = t \\\\ y = t \\\\ z = t \\end{cases}$", "$\\begin{cases} x = 0 \\\\ y = t \\\\ z = 0 \\end{cases}$", "$\\begin{cases} x = t \\\\ y = 0 \\\\ z = 0 \\end{cases}$"], ans: "$\\begin{cases} x = 0 \\\\ y = 0 \\\\ z = t \\end{cases}$", exp: "នៅលើអ័ក្ស $Oz$ តម្លៃ $x$ និង $y$ ស្មើ $0$ ជានិច្ច ចំណែកឯ $z$ ប្រែប្រួលសេរីតាមប៉ារ៉ាម៉ែត្រ $t$។" },
        { q: "រកប្រវែងកាំនៃរង្វង់ប្រសព្វ រវាងដែនស៊្វែរ $x^2 + y^2 + z^2 = 25$ និងប្លង់ $z = 3$?", opt: ["$4$", "$16$", "$3$", "$5$"], ans: "$4$", exp: "តាមទ្រឹស្តីបទពីតាករ កាំរង្វង់ប្រសព្វ $r = \\sqrt{R^2 - d^2} = \\sqrt{25 - 3^2} = \\sqrt{16} = 4$។" },
        { q: "រកសមីការប្លង់កាត់តាម $A(1, 2, -1)$ ហើយស្របនឹងប្លង់កូអរដោនេ $(Oxy)$?", opt: ["$z = -1$", "$z = 1$", "$x = 1$", "$y = 2$"], ans: "$z = -1$", exp: "ប្លង់ស្របនឹង $(Oxy)$ គឺមានទម្រង់ $z = c$។ ដោយសារវាផ្ទៀងផ្ទាត់ចំណុច $A$ នាំឱ្យ $z = -1$។" },
        { q: "បើវ៉ិចទ័រ $\\vec{u}$ និង $\\vec{v}$ បង្កើតបានមុំ $180^\\circ$ តើផលគុណស្កាលែរបស់វាស្មើនឹងអ្វី?", opt: ["$-||\\vec{u}|| \\cdot ||\\vec{v}||$", "$||\\vec{u}|| \\cdot ||\\vec{v}||$", "$0$", "$-1$"], ans: "$-||\\vec{u}|| \\cdot ||\\vec{v}||$", exp: "ដោយសារ $\\cos 180^\\circ = -1$ នាំឱ្យផលគុណស្កាលែ $\\vec{u}\\cdot\\vec{v} = ||\\vec{u}|\\cdot||\\vec{v}||(-1)$។" },
        { q: "តើផលគុណចម្រុះ $(\\vec{u} \\times \\vec{v}) \\cdot \\vec{w}$ មានតម្លៃអវិជ្ជមានបានដែរឬទេ?", opt: ["បាន ព្រោះវាជាចំនួនពិត (Scalar)", "មិនបានទេ ព្រោះវាជាមាឌ", "មិនបានទេ ព្រោះវាជាប្រវែង", "បាន លុះត្រាតែវ៉ិចទ័រមួយជាវ៉ិចទ័រសូន្យ"], ans: "បាន ព្រោះវាជាចំនួនពិត (Scalar)", exp: "ផលគុណចម្រុះជាស្កាលែ (ចំនួនពិត) ដូចនេះវាអាចវិជ្ជមាន អវិជ្ជមាន ឬសូន្យ។ ប៉ុន្តែពេលគណនា «មាឌ» គេត្រូវបំពាក់តម្លៃដាច់ខាតឱ្យវា។" }
    ];

    // មុខងារសម្រាប់ Shuffle Array (Algorithm: Fisher-Yates)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // ១. ធ្វើការ Shuffle លំដាប់លំហាត់
    const shuffledQuestions = shuffle([...questions]);

    const form = document.getElementById('quizForm');
    shuffledQuestions.forEach((item, i) => {
        // ២. ធ្វើការ Shuffle លំដាប់ជម្រើសចម្លើយនៅក្នុងសំណួរនីមួយៗ
        let shuffledOptions = shuffle([...item.opt]);

        let optHtml = shuffledOptions.map(o => `
            <label>
                <input type="radio" name="q${i}" value="${o}"> ${o}
            </label>
        `).join('');
        
        form.innerHTML += `
            <div class="question-box">
                <div class="question-title">សំណួរទី ${i+1}: ${item.q}</div>
                <div class="options">${optHtml}</div>
                <div id="r${i}" class="feedback"></div>
            </div>
        `;
    });

    // មុខងារកែពិន្ទុ និងបង្ហាញដំណោះស្រាយ
    function evaluateQuiz() {
        const name = document.getElementById('sName').value.trim();
        const sClass = document.getElementById('sClass').value.trim();

        if (!name || !sClass) {
            alert("សូមបំពេញឈ្មោះ និងថ្នាក់រៀនរបស់សិស្សជាមុនសិន!");
            return;
        }

        let score = 0;
        shuffledQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const resBox = document.getElementById(`r${i}`);
            resBox.style.display = "block";

            if (selected && selected.value === item.ans) {
                score++;
                resBox.className = "feedback correct";
                resBox.innerHTML = "✅ <b>ត្រឹមត្រូវ!</b> ដំណោះស្រាយ៖ " + item.exp;
            } else {
                resBox.className = "feedback incorrect";
                resBox.innerHTML = "❌ <b>មិនត្រឹមត្រូវទេ!</b> ចម្លើយដែលត្រូវគឺ៖ " + item.ans + "<br>💡 <b>ការពន្យល់៖</b> " + item.exp;
            }
        });

        const summaryBox = document.getElementById('summary');
        summaryBox.style.display = "block";
        summaryBox.innerHTML = `🎓 បេក្ខជន៖ ${name} | ថ្នាក់៖ ${sClass} <br> 📊 លទ្ធផលទទួលបាន៖ ${score} / ${shuffledQuestions.length} សំណួរ (ចំណាត់ថ្នាក់៖ ${Math.round((score/25)*100)}%)`;
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        
        summaryBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>
